services:
  postgres:
    image: postgres:16
    container_name: trip_postgres
    environment:
      POSTGRES_DB: trip
      POSTGRES_USER: trip
      POSTGRES_PASSWORD: trip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trip_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: trip_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip_backend
    environment:
      DATABASE_URL: postgresql+psycopg://trip:trip@postgres:5432/trip
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/database
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trip_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
